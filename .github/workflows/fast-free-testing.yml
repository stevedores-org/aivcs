# fast-free-testing CI trigger
#
# stevedores-org/aivcs is a registered client of lornu-ai/fast-free-testing,
# an AWS Lambda-backed CI service with an API Gateway webhook endpoint.
#
# Plan: unlimited-free
#   - No quota, no rate limiting
#   - All checks run on every PR:
#       * type-safety  (cargo check --workspace)
#       * unit-tests   (cargo nextest run --workspace)
#       * secrets      (trufflehog / gitleaks scan)
#       * config-lint  (clippy -D warnings)
#
# Checks appear as individual GitHub Check Runs under the heading:
#   "fast-free-testing / <check>"
#
# Required secret:
#   FAST_FREE_TESTING_WEBHOOK_URL — the API Gateway /github endpoint
#   (rotate by updating the secret; no workflow changes needed)
#
# Repo config: Rust workspace, cargo-nextest, clippy -D warnings

name: fast-free-testing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  trigger:
    name: Trigger fast-free-testing
    runs-on: ubuntu-latest
    permissions:
      checks: write        # needed to create/update check runs
      contents: read
    steps:
      - name: Trigger fast-free-testing CI
        env:
          # The deployed fast-free-testing API Gateway endpoint
          # Stored as a repo secret so the URL can be rotated
          FFT_WEBHOOK_URL: ${{ secrets.FAST_FREE_TESTING_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build the PR payload matching GitHubPREvent interface
          PAYLOAD=$(jq -nc \
            --arg action "synchronize" \
            --argjson pr_number ${{ github.event.pull_request.number }} \
            --arg head_sha "${{ github.event.pull_request.head.sha }}" \
            --arg head_ref "${{ github.event.pull_request.head.ref }}" \
            --arg base_ref "${{ github.event.pull_request.base.ref }}" \
            --arg repo_name "${{ github.event.repository.name }}" \
            --arg owner "${{ github.event.repository.owner.login }}" \
            --arg full_name "${{ github.event.repository.full_name }}" \
            '{
              action: $action,
              pull_request: {
                number: $pr_number,
                head: { sha: $head_sha, ref: $head_ref },
                base: { ref: $base_ref }
              },
              repository: {
                name: $repo_name,
                owner: { login: $owner },
                full_name: $full_name
              }
            }')

          if [ -z "$FFT_WEBHOOK_URL" ]; then
            echo "::warning::FAST_FREE_TESTING_WEBHOOK_URL not set — skipping fast-free-testing trigger"
            exit 0
          fi

          STATUS=$(curl -s -o /tmp/fft-response.json -w "%{http_code}" \
            -X POST "$FFT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "fast-free-testing response: HTTP $STATUS"
          cat /tmp/fft-response.json

          if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 202 ]; then
            echo "::warning::fast-free-testing returned HTTP $STATUS — checks may not appear"
          fi

  # Branch protection aggregator: creates "rust-checks" status from FFT check results
  # This maintains backward compatibility with branch protection rules that require "rust-checks"
  rust-checks:
    name: rust-checks (FFT aggregator)
    runs-on: ubuntu-latest
    needs: trigger
    if: always()
    permissions:
      contents: read
    steps:
      - name: Wait for fast-free-testing checks to complete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          max_attempts=240
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            # Fetch fast-free-testing checks; catch API errors explicitly
            if ! result=$(gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/check-runs \
              --jq '.check_runs[] | select(.name | startswith("fast-free-testing"))'); then
              echo "::error::GitHub API call failed (likely auth/permissions issue)"
              exit 1
            fi

            if [ -z "$result" ]; then
              echo "Waiting for fast-free-testing checks... (attempt $((attempt+1))/$max_attempts)"
              sleep 1
              attempt=$((attempt+1))
              continue
            fi

            # Check if all checks are in terminal state (not null/pending)
            # Terminal states: success, failure, cancelled, timed_out, stale, action_required
            if echo "$result" | jq -e 'select(.conclusion == null)' >/dev/null 2>&1; then
              echo "Checks still in progress... (attempt $((attempt+1))/$max_attempts)"
              sleep 1
              attempt=$((attempt+1))
              continue
            fi

            # All checks are terminal; verify none failed
            if echo "$result" | jq -e 'select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")' >/dev/null 2>&1; then
              echo "::error::fast-free-testing checks completed with failures/cancellations"
              exit 1
            fi

            echo "✓ fast-free-testing checks PASSED"
            exit 0
          done

          echo "::error::Timeout waiting for fast-free-testing checks after ${max_attempts}s"
          exit 1
