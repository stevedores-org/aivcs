name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ATTIC_SERVER: https://nix-cache.stevedores.org
  ATTIC_CACHE: aivcs
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo nextest run --workspace --cargo-profile ci --profile ci

      - name: Doc Tests
        run: cargo test --doc --workspace --profile ci

  nix-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://nix-cache.stevedores.org
            extra-trusted-public-keys = stevedores-cache-1:bXLxkipycRWproIJnk8pPWNFdgVfeV+I2mJXCoW4/ag=

      - name: Nix flake check
        run: nix flake check --print-build-logs

  aivcs-reproducibility:
    name: aivcs reproducibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://nix-cache.stevedores.org
            extra-trusted-public-keys = stevedores-cache-1:bXLxkipycRWproIJnk8pPWNFdgVfeV+I2mJXCoW4/ag=

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}

      - name: Run Reproducibility Check
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: cargo run -p aivcs-cli -- pr verify-reproducibility
