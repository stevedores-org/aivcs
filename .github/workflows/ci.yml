name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ATTIC_SERVER: https://nix-cache.stevedores.org
  ATTIC_CACHE: aivcs
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo nextest run --workspace --cargo-profile ci --profile ci

      - name: Doc Tests
        run: cargo test --doc --workspace --profile ci

  # Each shard builds one flake derivation in parallel so a 30s `fmt`
  # regression fails fast instead of waiting behind a 6-minute `tests`
  # build. Wall-clock = slowest shard, not sum of all derivations.
  # See stevedores-org/aivcs#240 (TDD).
  nix-checks:
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: clippy
            path: checks
          - check: fmt
            path: checks
          - check: tests
            path: checks
          - check: aivcs
            path: packages
          - check: aivcsd
            path: packages
    runs-on: ubuntu-latest
    # `tests` is the long pole — it compiles the whole workspace AND runs
    # nextest on a cold ubuntu-latest runner. Observed 20m+ on the first
    # Phase 1 run (PR #244, job 81204220659), so 30m for ample headroom.
    # Other shards finish in 1–20m and exit well under the cap.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://nix-cache.stevedores.org
            extra-trusted-public-keys = stevedores-cache-1:bXLxkipycRWproIJnk8pPWNFdgVfeV+I2mJXCoW4/ag=

      - name: Build ${{ matrix.path }}.${{ matrix.check }}
        run: nix build ".#${{ matrix.path }}.x86_64-linux.${{ matrix.check }}" --print-build-logs

  # Single required-check at branch protection. Matrix legs above are
  # informational; this aggregator fails iff any leg failed. Without it,
  # branch protection would need to track 5 individual matrix-leg names
  # that re-name themselves when the matrix shape changes.
  nix-checks-summary:
    runs-on: ubuntu-latest
    needs: [nix-checks]
    if: always()
    steps:
      - name: Summarise nix-checks matrix
        run: |
          if [ "${{ needs.nix-checks.result }}" != "success" ]; then
            echo "::error::one or more nix-checks shards failed (result: ${{ needs.nix-checks.result }})"
            exit 1
          fi
          echo "all nix-checks shards passed"

  code-review-approval:
    name: Code Review Approval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for required approval
        if: github.event_name == 'pull_request'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

          echo "Checking for review approvals on PR #$PR_NUMBER..."

          # Fetch reviews for the PR
          APPROVALS=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews" \
            | jq '[.[] | select(.state == "APPROVED")] | length')

          echo "Found $APPROVALS approval(s)"

          if [ "$APPROVALS" -lt 1 ]; then
            echo "⚠ Awaiting code review approval (0 of 1 required)"
          else
            echo "✓ Code review approval requirement satisfied ($APPROVALS approval(s))"
          fi

  aivcs-reproducibility:
    name: aivcs reproducibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://nix-cache.stevedores.org
            extra-trusted-public-keys = stevedores-cache-1:bXLxkipycRWproIJnk8pPWNFdgVfeV+I2mJXCoW4/ag=

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}

      - name: Ensure Rust toolchain (with retries)
        run: |
          set -euo pipefail
          retries=3
          delay=10
          for i in $(seq 1 $retries); do
            echo "Attempt $i/$retries: ensure rustup + stable toolchain"
            if command -v rustup >/dev/null 2>&1; then
              echo "rustup present, trying to install stable components"
              if rustup default stable && rustup component add rustfmt clippy; then
                echo "Rust toolchain ready"
                break
              fi
            else
              echo "rustup missing, installing via curl"
              if curl --proto '=https' --tlsv1.2 --retry 5 --retry-delay 5 --location --silent --show-error --fail https://sh.rustup.rs | sh -s -- --default-toolchain none -y; then
                export PATH="$HOME/.cargo/bin:$PATH"
                if rustup default stable && rustup component add rustfmt clippy; then
                  echo "Rust toolchain ready after install"
                  break
                fi
              fi
            fi
            if [ "$i" -eq "$retries" ]; then
              echo "Failed to prepare Rust toolchain after $retries attempts" >&2
              exit 1
            fi
            echo "Retrying in ${delay}s..."
            sleep $delay
            delay=$((delay * 2))
          done

      - name: Run Reproducibility Check (with retries)
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          set -euo pipefail
          retries=3
          delay=10
          for i in $(seq 1 $retries); do
            echo "Attempt $i/$retries: cargo run -p aivcs-cli -- pr verify-reproducibility"
            if cargo run -p aivcs-cli -- pr verify-reproducibility; then
              echo "Reproducibility check succeeded on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed; sleeping ${delay}s before retry..."
            sleep $delay
            delay=$((delay * 2))
          done
          echo "::error::Reproducibility check failed after $retries attempts"
          exit 1
