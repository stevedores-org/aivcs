# dockworker.toml — OCI manifest for AIVCS (Nix + skopeo; no Dockerfile)
# GitLab CI publishes via: cargo run -p aivcs-cli -- oci publish --target aivcs-cli

[package]
name = "aivcs"
version = "0.3.2"
description = "AIVCS CLI — sovereign infra reconcilers"
runtime = "rust"

[oci]
spec = "1.0"
builder = "nix"

[oci.image]
authors = ["Stevedores Org <engineering@stevedores.org>"]
url = "https://github.com/stevedores-org/aivcs"
source = "https://github.com/stevedores-org/aivcs"
vendor = "stevedores-org"
licenses = "Apache-2.0"
title = "aivcs"

[oci.image.labels]
"lornu.ai/component" = "aivcs-cli"
"lornu.ai/managed-by" = "dockworker"
"lornu.ai/runtime" = "rust"
"lornu.ai/team" = "platform"

[oci.config]
user = "65532:65532"
entrypoint = ["/bin/aivcs"]
stop_signal = "SIGTERM"

[oci.config.env]
RUST_LOG = "info"

[build]
runtime = "rust"
engine = "nix"
targets = [
  { name = "aivcs-cli", nix_target = ".#aivcs-cli-image", image = "aivcs" },
  { name = "aivcsd", nix_target = ".#aivcsd-image", image = "aivcsd" },
]

[oci.platforms]
architectures = ["amd64"]

[oci.security]
user = 65532
group = 65532
read_only_rootfs = true
no_new_privileges = true
drop_capabilities = ["ALL"]

[registry]
url = "us-central1-docker.pkg.dev/gcp-lornu-ai/lornu"
tags = ["0.3.2", "develop", "latest"]

[deploy]
targets = ["kubernetes"]
namespace = "flux-system"
replicas = 1
